<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#fff7ee">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<title>imo - Learn Japanese</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800;900&family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <nav class="top-nav">
    <div class="nav-actions">
      <button class="icon-btn theme-toggle" id="theme-toggle" type="button" aria-label="Toggle dark and light mode">
        <svg class="lucide moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        <svg class="lucide sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
      </button>
    </div>
  </nav>

  <header class="hero">
    <img class="logo" src="imo.svg" alt="imo" width="auto" height="auto">
  </header>

  <section class="stats" aria-label="Your progress">
    <div class="stat">
      <span class="stat-label">Today</span>
      <span class="stat-value" id="stat-today">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">This category</span>
      <span class="stat-value accent" id="stat-cat">0/0</span>
    </div>
    <div class="stat">
      <span class="stat-label">Total learned</span>
      <span class="stat-value" id="stat-total">0</span>
    </div>
  </section>

  <div class="mode-switch" role="tablist" aria-label="Study mode">
    <!-- data-pos drives the sliding pill: 0=Dictionary, 1=Cards, 2=Quiz.
         Default is 1 (Cards) since that's the default state.mode. -->
    <span class="mode-pill" id="mode-pill" data-pos="1" aria-hidden="true"></span>
    <button class="mode-btn" id="mode-dictionary" role="tab" aria-selected="false" type="button">
      <svg class="lucide" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m16 6 4 14"/><path d="M12 6v14"/><path d="M8 8v12"/><path d="M4 4v16"/></svg>Dictionary
    </button>
    <button class="mode-btn active" id="mode-cards" role="tab" aria-selected="true" type="button">
      <svg class="lucide" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"/><path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"/></svg>Cards
    </button>
    <button class="mode-btn" id="mode-quiz" role="tab" aria-selected="false" type="button">
      <svg class="lucide" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>Quiz
    </button>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-ico" aria-hidden="true">
        <svg class="lucide" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </span>
      <input id="search-input" class="search-input" type="search" placeholder="Search Japanese, romaji, or English…" aria-label="Search words" autocomplete="off">
      <button class="search-clear" id="search-clear" type="button" aria-label="Clear search">
        <svg class="lucide" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>
    <div class="toggle-row">
      <button id="toggle-unlearned" class="chip" type="button" data-state="off" aria-pressed="false">
        <svg class="lucide" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 20h10"/><path d="M10 20c5.5-2.5.8-6.4 3-10"/><path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z"/><path d="M14.1 6a7 7 0 0 0-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.1-4 1-4.9 2z"/></svg>
        <span class="label-on">Only unlearned</span>
        <span class="label-off">All words</span>
      </button>
      <button id="shuffle-btn" class="chip" type="button" data-state="off" aria-pressed="false">
        <svg class="lucide" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H22"/><path d="m18 2 4 4-4 4"/><path d="M2 6h1.9c1.5 0 2.9.9 3.6 2.2"/><path d="M22 18h-5.9c-1.3 0-2.6-.7-3.3-1.8l-.5-.8"/><path d="m18 14 4 4-4 4"/></svg>
        <span class="label-on">Shuffled</span>
        <span class="label-off">Shuffle</span>
      </button>
      <button id="toggle-romaji" class="chip" type="button" data-state="on" aria-pressed="true">
        <svg class="lucide" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
        <span class="label-on">Romaji on</span>
        <span class="label-off">Romaji off</span>
      </button>
      <button id="reset-category" class="chip danger" type="button" data-state="static" title="Reset progress for this category">
        <svg class="lucide" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        <span class="label-on">Reset</span>
      </button>
    </div>
  </div>

  <div class="cats-wrap" id="cats" aria-label="Categories"></div>

  <div class="progress-card">
    <div class="progress-info">
      <span class="progress-title">Category progress</span>
      <span class="progress-count" id="prog-label">0 / 0</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    <span class="progress-pct" id="prog-pct">0%</span>
  </div>

  <main class="vocab-section" id="vocab"></main>
</div>

<!-- Floating "let's go!" toast that appears once a category is picked
     and slides the user down to the cards/quiz section. -->
<button id="go-toast" class="go-toast" type="button" aria-label="Jump to the cards">
  <span class="go-toast-text">行きましょう！</span>
  <svg class="lucide go-toast-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>
</button>

<!-- Load order matters: each module depends on the previous one's globals.
     Plain <script> tags (not modules) so this works via file:// without a dev server. -->
<script src="src/data.js" defer></script>
<script src="src/state.js" defer></script>
<script src="src/render.js" defer></script>
<script src="src/app.js" defer></script>
<script src="src/native.js" defer></script>
</body>
</html>
